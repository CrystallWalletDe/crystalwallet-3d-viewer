<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
  <link rel="alternate" type="application/json+oembed" href="https://crystallwalletde.github.io/crystalwallet-3d-viewer/oembed.json" title="CrystalWallet PCB 3D View">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CrystalWallet PCB — Interactive 3D View</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{width:100%;height:100%;overflow:hidden;background:#0a0a0f;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif}
#canvas-container{width:100%;height:100%;position:relative}
canvas{display:block;width:100%;height:100%}
#controls{position:absolute;bottom:16px;left:50%;transform:translateX(-50%);display:flex;gap:8px;z-index:10}
#controls button{background:rgba(255,255,255,0.08);border:1px solid rgba(255,255,255,0.15);color:#ccc;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px;backdrop-filter:blur(8px);transition:all .2s}
#controls button:hover{background:rgba(255,255,255,0.15);color:#fff}
#controls button.active{background:rgba(0,200,150,0.2);border-color:rgba(0,200,150,0.4);color:#00c896}
#loading{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);text-align:center;color:#888;z-index:20}
#loading .spinner{width:48px;height:48px;border:3px solid rgba(255,255,255,0.1);border-top:3px solid #00c896;border-radius:50%;animation:spin 1s linear infinite;margin:0 auto 16px}
@keyframes spin{to{transform:rotate(360deg)}}
#loading .progress{font-size:14px;margin-top:8px;color:#555}
#info{position:absolute;top:12px;left:12px;color:rgba(255,255,255,0.4);font-size:11px;z-index:10;pointer-events:none}
#brand{position:absolute;top:12px;right:12px;color:rgba(255,255,255,0.5);font-size:12px;font-weight:600;letter-spacing:1px;z-index:10;pointer-events:none}
</style>
</head>
<body>
<div id="canvas-container">
  <div id="loading">
    <div class="spinner"></div>
    <div>Loading 3D Model...</div>
    <div class="progress" id="load-progress"></div>
  </div>
  <div id="info">Drag to rotate &#183; Scroll to zoom &#183; Right-click to pan</div>
  <div id="brand">CRYSTALWALLET</div>
  <div id="controls">
    <button onclick="resetView()" title="Reset camera">&#x21BA; Reset</button>
    <button onclick="viewTop()" title="Top view">&#x2191; Top</button>
    <button onclick="viewBottom()" title="Bottom view">&#x2193; Bottom</button>
    <button onclick="viewISO()" title="Isometric view">&#x25C7; ISO</button>
    <button id="btn-auto" class="active" onclick="toggleAutoRotate()" title="Auto-rotate">&#x21BB; Auto</button>
  </div>
</div>

<script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.170.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/"
  }
}
</script>
<script type="module">
import * as THREE from 'three';
import { OrbitControls } from 'three/addons/controls/OrbitControls.js';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { DRACOLoader } from 'three/addons/loaders/DRACOLoader.js';

const container = document.getElementById('canvas-container');
const loadingEl = document.getElementById('loading');
const progressEl = document.getElementById('load-progress');

// Renderer
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: false });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(container.clientWidth, container.clientHeight);
renderer.setClearColor(0x0a0a0f);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;
container.appendChild(renderer.domElement);

// Scene
const scene = new THREE.Scene();

// Camera
const camera = new THREE.PerspectiveCamera(40, container.clientWidth / container.clientHeight, 0.1, 1000);
camera.position.set(60, 50, 60);

// Controls
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.08;
controls.autoRotate = true;
controls.autoRotateSpeed = 1.2;
controls.minDistance = 20;
controls.maxDistance = 200;
controls.maxPolarAngle = Math.PI * 0.85;
controls.target.set(0, 0, 0);

// Lighting
const ambientLight = new THREE.AmbientLight(0xffffff, 0.5);
scene.add(ambientLight);

const dirLight1 = new THREE.DirectionalLight(0xffffff, 1.5);
dirLight1.position.set(50, 80, 50);
dirLight1.castShadow = false;
scene.add(dirLight1);

const dirLight2 = new THREE.DirectionalLight(0xccddff, 0.6);
dirLight2.position.set(-40, 60, -30);
scene.add(dirLight2);

const dirLight3 = new THREE.DirectionalLight(0xffeedd, 0.4);
dirLight3.position.set(0, -30, 50);
scene.add(dirLight3);

// Subtle environment
const hemiLight = new THREE.HemisphereLight(0x1a1a2e, 0x0a0a0f, 0.3);
scene.add(hemiLight);

// Load model
const dracoLoader = new DRACOLoader();
dracoLoader.setDecoderPath('https://cdn.jsdelivr.net/npm/three@0.170.0/examples/jsm/libs/draco/');

const loader = new GLTFLoader();
loader.setDRACOLoader(dracoLoader);

let modelCenter = new THREE.Vector3();
let modelSize = 0;

const modelURL = new URL('./crystalwallet_pcb.glb', window.location.href).href;

loader.load(
  modelURL,
  (gltf) => {
    const model = gltf.scene;
    
    // Center model
    const box = new THREE.Box3().setFromObject(model);
    const center = box.getCenter(new THREE.Vector3());
    const size = box.getSize(new THREE.Vector3());
    modelSize = Math.max(size.x, size.y, size.z);
    modelCenter.copy(center);
    
    model.position.sub(center);
    
    // Enhance materials
    model.traverse((child) => {
      if (child.isMesh) {
        if (child.material) {
          child.material.roughness = Math.max(child.material.roughness || 0.5, 0.3);
          child.material.metalness = Math.min(child.material.metalness || 0.5, 0.8);
          child.material.needsUpdate = true;
        }
      }
    });
    
    scene.add(model);
    
    // Fit camera
    const dist = modelSize * 1.6;
    camera.position.set(dist * 0.8, dist * 0.6, dist * 0.8);
    controls.target.set(0, 0, 0);
    controls.minDistance = modelSize * 0.4;
    controls.maxDistance = modelSize * 4;
    controls.update();
    
    loadingEl.style.display = 'none';
  },
  (xhr) => {
    if (xhr.total > 0) {
      const pct = Math.round((xhr.loaded / xhr.total) * 100);
      progressEl.textContent = pct + '%';
    }
  },
  (error) => {
    console.error('Error loading model:', error);
    progressEl.textContent = 'Error loading model';
  }
);

// Animation loop
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();

// Resize
window.addEventListener('resize', () => {
  camera.aspect = container.clientWidth / container.clientHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(container.clientWidth, container.clientHeight);
});

// Global functions for buttons
window.resetView = () => {
  const dist = modelSize * 1.6;
  gsapTo(camera.position, { x: dist * 0.8, y: dist * 0.6, z: dist * 0.8 });
  controls.target.set(0, 0, 0);
};

window.viewTop = () => {
  const dist = modelSize * 1.8;
  gsapTo(camera.position, { x: 0, y: dist, z: 0.01 });
  controls.target.set(0, 0, 0);
};

window.viewBottom = () => {
  const dist = modelSize * 1.8;
  gsapTo(camera.position, { x: 0, y: -dist, z: 0.01 });
  controls.target.set(0, 0, 0);
};

window.viewISO = () => {
  const dist = modelSize * 1.4;
  gsapTo(camera.position, { x: dist, y: dist * 0.7, z: dist });
  controls.target.set(0, 0, 0);
};

window.toggleAutoRotate = () => {
  controls.autoRotate = !controls.autoRotate;
  document.getElementById('btn-auto').classList.toggle('active', controls.autoRotate);
};

// Simple smooth camera transition
function gsapTo(obj, target, duration = 800) {
  const start = { x: obj.x, y: obj.y, z: obj.z };
  const startTime = performance.now();
  function step(now) {
    const t = Math.min((now - startTime) / duration, 1);
    const ease = 1 - Math.pow(1 - t, 3); // easeOutCubic
    obj.x = start.x + (target.x - start.x) * ease;
    obj.y = start.y + (target.y - start.y) * ease;
    obj.z = start.z + (target.z - start.z) * ease;
    if (t < 1) requestAnimationFrame(step);
  }
  requestAnimationFrame(step);
}
</script>
</body>
</html>
